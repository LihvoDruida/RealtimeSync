name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
  CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Gradle wrapper executable bit
        shell: bash
        run: |
          chmod +x ./gradlew
          git update-index --chmod=+x ./gradlew || true

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version from tag
        id: tag_version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${TAG}" != v* ]]; then
            echo "This workflow must be started by a v* tag. Current ref: ${GITHUB_REF_TYPE}/${TAG}" >&2
            exit 1
          fi

          MOD_VERSION="${TAG#v}"
          if [[ -z "${MOD_VERSION}" ]]; then
            echo "Could not resolve mod version from tag '${TAG}'. Expected tag format like v1.5.5" >&2
            exit 1
          fi

          sed -i "s/^mod_version=.*/mod_version=${MOD_VERSION}/" gradle.properties

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved mod version from tag: ${MOD_VERSION}"
          grep '^mod_version=' gradle.properties

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --output CHANGELOG.md

      - name: Verify Changelog
        shell: bash
        run: |
          test -s CHANGELOG.md
          cat CHANGELOG.md

      - name: Read project versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          read_prop() {
            grep "^$1=" gradle.properties | cut -d'=' -f2-
          }
          MC_VERSIONS_FILE="$(read_prop curseforge_game_versions_file)"
          if [[ -z "${MC_VERSIONS_FILE}" || ! -s "${MC_VERSIONS_FILE}" ]]; then
            echo "CurseForge game versions file is missing or empty: ${MC_VERSIONS_FILE}" >&2
            exit 1
          fi

          echo "minecraft_version=$(read_prop minecraft_version)" >> "$GITHUB_OUTPUT"
          echo "minecraft_compat_label=$(read_prop minecraft_compat_label)" >> "$GITHUB_OUTPUT"
          echo "mod_version=$(read_prop mod_version)" >> "$GITHUB_OUTPUT"
          echo "java_version=$(read_prop java_version)" >> "$GITHUB_OUTPUT"
          {
            echo 'curseforge_game_versions<<EOF'
            sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "${MC_VERSIONS_FILE}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "CurseForge game versions:"
          sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' "${MC_VERSIONS_FILE}"

      - name: Build all loader jars
        shell: bash
        run: bash ./gradlew clean buildAllLoaders --stacktrace

      - name: Verify release jars
        shell: bash
        run: |
          set -euo pipefail
          MC="${{ steps.versions.outputs.minecraft_version }}"
          MOD="${{ steps.versions.outputs.mod_version }}"
          test "${MOD}" = "${{ steps.tag_version.outputs.mod_version }}"
          test -f "fabric/build/libs/realtime-sync-fabric-${MC}-${MOD}.jar"
          test -f "forge/build/libs/realtime-sync-forge-${MC}-${MOD}.jar"
          test -f "neoforge/build/libs/realtime-sync-neoforge-${MC}-${MOD}.jar"
          ls -lah fabric/build/libs forge/build/libs neoforge/build/libs

      - name: Upload loader jars
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeSync-${{ steps.versions.outputs.mod_version }}-mc${{ steps.versions.outputs.minecraft_compat_label }}-loader-jars
          if-no-files-found: error
          path: |
            fabric/build/libs/realtime-sync-fabric-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
            forge/build/libs/realtime-sync-forge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
            neoforge/build/libs/realtime-sync-neoforge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            fabric/build/libs/realtime-sync-fabric-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
            forge/build/libs/realtime-sync-forge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
            neoforge/build/libs/realtime-sync-neoforge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
          body_path: CHANGELOG.md

      - name: Publish Fabric and Quilt file to CurseForge
        if: env.CURSEFORGE_PROJECT_ID != '' && env.CURSEFORGE_TOKEN != ''
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ env.CURSEFORGE_TOKEN }}
          files: fabric/build/libs/realtime-sync-fabric-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
          name: RealtimeSync ${{ steps.versions.outputs.mod_version }} [Minecraft ${{ steps.versions.outputs.minecraft_compat_label }}] Fabric/Quilt
          version: fabric-quilt-${{ steps.versions.outputs.mod_version }}+mc${{ steps.versions.outputs.minecraft_compat_label }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: |
            fabric
            quilt
          game-versions: |
            ${{ steps.versions.outputs.curseforge_game_versions }}
          java: |
            ${{ steps.versions.outputs.java_version }}

      - name: Publish Forge file to CurseForge
        if: env.CURSEFORGE_PROJECT_ID != '' && env.CURSEFORGE_TOKEN != ''
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ env.CURSEFORGE_TOKEN }}
          files: forge/build/libs/realtime-sync-forge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
          name: RealtimeSync ${{ steps.versions.outputs.mod_version }} [Minecraft ${{ steps.versions.outputs.minecraft_compat_label }}] Forge
          version: forge-${{ steps.versions.outputs.mod_version }}+mc${{ steps.versions.outputs.minecraft_compat_label }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: |
            forge
          game-versions: |
            ${{ steps.versions.outputs.curseforge_game_versions }}
          java: |
            ${{ steps.versions.outputs.java_version }}

      - name: Publish NeoForge file to CurseForge
        if: env.CURSEFORGE_PROJECT_ID != '' && env.CURSEFORGE_TOKEN != ''
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ env.CURSEFORGE_TOKEN }}
          files: neoforge/build/libs/realtime-sync-neoforge-${{ steps.versions.outputs.minecraft_version }}-${{ steps.versions.outputs.mod_version }}.jar
          name: RealtimeSync ${{ steps.versions.outputs.mod_version }} [Minecraft ${{ steps.versions.outputs.minecraft_compat_label }}] NeoForge
          version: neoforge-${{ steps.versions.outputs.mod_version }}+mc${{ steps.versions.outputs.minecraft_compat_label }}
          version-type: release
          changelog-file: CHANGELOG.md
          loaders: |
            neoforge
          game-versions: |
            ${{ steps.versions.outputs.curseforge_game_versions }}
          java: |
            ${{ steps.versions.outputs.java_version }}
